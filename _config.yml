title: Vidhya Arvind
author:
  name: Vidhya Arvind
description: >-
  Staff Software Engineer at Netflix and founding architect of Netflix's Data
  Abstraction Platform. I write and speak about distributed databases, data
  abstractions, and platform engineering at scale.

url: "https://vidhyaarvind.github.io"
permalink: /:year/:month/:day/:title/

plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Pages shown in the top navigation, in order.
header_pages:
  - about.md
  - writing.md
  - talks.md

# Social links surfaced in the footer / about page.
social:
  github:   vidhyaarvind
  linkedin: vidhya-arvind-11908723
  twitter:  vidhyaarvind

# Files / directories to keep out of the build output.
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - script
  - History.markdown
  - CODE_OF_CONDUCT.md
  - LICENSE.txt
  - README.md
  - readme_banner.svg
  - screenshot.png
  - minima.gemspec
  - node_modules
