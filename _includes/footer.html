<footer class="site-footer">
  <div class="footer-inner">
    <p class="footer-tagline">{{ site.description | escape }}</p>
    <ul class="footer-links">
      {% if site.social.github %}
        <li><a href="https://github.com/{{ site.social.github }}" rel="me noopener">GitHub</a></li>
      {% endif %}
      {% if site.social.linkedin %}
        <li><a href="https://www.linkedin.com/in/{{ site.social.linkedin }}/" rel="me noopener">LinkedIn</a></li>
      {% endif %}
      {% if site.social.twitter %}
        <li><a href="https://twitter.com/{{ site.social.twitter }}" rel="me noopener">Twitter</a></li>
      {% endif %}
      <li><a href="{{ '/feed.xml' | relative_url }}">RSS</a></li>
    </ul>
    <p class="footer-copy">&copy; {{ site.time | date: '%Y' }} {{ site.author.name | escape }}.</p>
  </div>
</footer>
